<html>
    <head>
        <title>Chat</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
       <style>
        #chat{
            width:100%;
            height:400px;
        }
        #send{
            width:1090px;
        }
        .user-message{
          text-align:right;
          font-size:20px;  
           
        }
        .bot-message{
                font-size:20px;  

        }
       </style>
    </head>
    <body>
        <div class="container mt-5">
            <h3 class="text-center text-primary">Hospital Chat Assistant 🏥 </h3>
            <div class="card p-3">
                <div id="chat"></div>
            </div>
            <input type="text" id="text" placeholder="Ask about patients,doctor,appointments..." class="form-control mt-4">
            <button onclick="send()" class="btn btn-primary mt-3" id="send">Send</button>
            <a href="dashboard.html" class="btn btn-dark mt-3">Back</a>
        </div>
        <script>
           async function send() {
            let text = document.getElementById("text").value;
            let response = await fetch(`http://localhost:8080/send?text=${text}`);
           let data = await response.text();
         document.getElementById("chat").innerHTML +=
            "<p class='user-message text-primary'><b>You:</b>" + text + "</p>";
            document.getElementById("chat").innerHTML +=
            "<p class='bot-message'><b>Bot:</b>" + data + "</p>";
            document.getElementById("text").value = "";
        
           
            
           }
         
           
        </script>
    </body>
</html>
