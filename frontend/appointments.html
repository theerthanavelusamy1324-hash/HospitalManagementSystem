<html>
    <head>
        <title>Appointments</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
       
    </head>
    <body>
        <div class="container mt-4">
            <h3 class="text-warning">Book Appointments</h3>
            <input type="text" id="names" placeholder="Patient Name" class="form-control mt-3">
            <select id="types" class="form-select mt-3">
                <option value="" disabled selected>Select</option>
                <option value="divya">Divya</option>
                <option value="babu">Babu</option>
                <option value="abi">Abi</option>
                <option value="ravi">Ravi</option>
            </select>
            <button onclick="book()" class="btn btn-warning mt-4">Book Appointment</button>
            <h3 class="mt-4">Appointment List</h3>
            <table class="table table-bordered mt-3">
                <thead class="table-warning">
                    <tr>
                        <th>Patient</th>
                         <th>Doctor</th>
                         
                    </tr>
                </thead>
                <tbody id="appointmenttable"></tbody>
            </table>
            <a href="dashboard.html" class="btn btn-dark">Back</a>
        </div>
        <script>
            async function book() {
            let name = document.getElementById("names").value;
             let doctor = document.getElementById("types").value;
            await fetch(`http://localhost:8080/book?name=${name}&doctor=${doctor}`);
            loadappointment();
            document.getElementById("names").value = "";
            document.getElementById("types").value = "";
                
            }
            async function loadappointment() {
                let response = await fetch(`http://localhost:8080/appointmentdetails`);
                let appointmentdata = await response.json();
                let row = "";
                for(let appointment of appointmentdata){
                    row+=`
                    <tr>
                        <td>${appointment.name}</td>
                         <td>${appointment.doctor}</td>
                          </tr>
                          `;
                }
                document.getElementById("appointmenttable").innerHTML = row;
                
            }
            loadappointment();
        </script>
        </body>
        </html>
