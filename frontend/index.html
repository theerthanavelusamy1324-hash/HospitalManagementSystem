<html>
    <head>
        <title>Login</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            .card{
                position:absolute;
                top:50px;
                width:400px;
                margin-top:80px;
                margin-left:400px;
                border-radius:10px;
            }
            img{
                position:relative;
                width:100%;
                height:100%;
            }
        </style> 
    </head>
    <body class="bg-light">
        <img src="https://tse2.mm.bing.net/th/id/OIP.hyXw8mpYOJVAd9k0naWcJAHaE7?pid=Api&P=0&h=180">
        <div class="container">
            <div class="card p-3 text-center">
                <h3 class="text-primary">🏥  Hospital Login</h3>
                <input type="email" id="email" placeholder="Email" class="form-control mt-3">
                 <input type="password" id="password" placeholder="Password" class="form-control mt-3">
                 <button onclick="login()" class="btn btn-primary mt-4">Login</button>
                 <p class="mt-3">Next User?<span class="text-primary mt-3" onclick="create()">Create Account</span></p>
                 <p class="mt-3 text-danger" id="result"></p>
            </div>
        </div>
        <script>
            async function login() {
                let email = document.getElementById("email").value;
                 let password = document.getElementById("password").value;
            let response = await fetch(`http://localhost:8080/login?email=${email}&password=${password}`,
                {
                    method:"POST"
                }
            );
            let data = await response.text();
            if(data == "success"){
                window.location.href = "dashboard.html";
            }
            else{
                document.getElementById("result").innerHTML = "Invalid password";
            }
                
            }
            function create(){
                window.location.href = "signup.html";
            }
        </script>
    </body>
</html>
