<html>
    <head>
        <title>Doctor</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
       
    </head>
    <body>
        <div class="container mt-4">
            <h3 class="text-success">Doctor Management</h3>
            <input type="text" id="doctorname" placeholder="Doctor Name" class="form-control mt-3">
            <select id="doctortype" class="form-select mt-3">
                <option value="" disabled selected>Select</option>
                <option value="onduty">OnDuty</option>
                <option value="offduty">OffDuty</option>
            </select>
            <button onclick="adddoctor()" class="btn btn-primary mt-4">Add Doctor</button>
            <h3 class="mt-4">Doctor List</h3>
            <table class="table table-bordered mt-3">
                <thead class="table-success">
                    <tr>
                        <th>Name</th>
                         <th>Status</th>
                          <th>Action</th>
                    </tr>
                </thead>
                <tbody id="doctortable"></tbody>
            </table>
            <a href="dashboard.html" class="btn btn-dark">Back</a>
        </div>
        <script>
            async function adddoctor() {
                let doctorname = document.getElementById("doctorname").value;
               let status = document.getElementById("doctortype").value;
            await fetch(`http://localhost:8080/adddoctor?doctorname=${doctorname}&status=${status}`);
            loaddoctor();
            document.getElementById("doctorname").value = "";
             document.getElementById("doctortype").value = "";
            }
            async function loaddoctor() {
            let response = await fetch(`http://localhost:8080/doctordetails`);
            let doctordata = await response.json();
            let row = "";
            for(let doctor of doctordata){
                row +=`
                <tr>
                    <td>${doctor.doctorname}</td>
                       <td>${doctor.status}</td>
                       <td><button onclick="deletedoctor(${doctor.id})" class="btn btn-danger btn-sm">Delete</button></td>
                       </tr>
                       `;
            }
            document.getElementById("doctortable").innerHTML = row;
                
            }
            loaddoctor();
            async function deletedoctor(id) {
                let confirmdelete = confirm("Are you want to delete this record");
                if(!confirmdelete){
                    return;
                }
            await fetch(`http://localhost:8080/deletedoctor?id=${id}`,
                {
                    method:"DELETE"
                }
            );
            loaddoctor();
                
            }
        </script>
    </body>
</html>
