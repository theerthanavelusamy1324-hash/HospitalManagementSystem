<html>
    <head>
        <title>Patients</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
       
    </head>
    <body class="bg-light">
       
        <div class="container mt-4">
            <h3 class="text-primary">Patient Registration</h3>
            <input type="text" id="patientname" placeholder="Patient Name" class="form-control mt-3">
             <input type="number" id="patientage" placeholder="Age" class="form-control mt-3">
             <div class="row">
                <div class="col">
                    <input type="text" id="disease" placeholder="Disease" class="form-control mt-3">

                </div>
                 <div class="col">
                  <select id="roomtype" class="form-select mt-3">
                    <option value="" disabled selected>Select</option>
                    <option value="generalward">General Ward</option>
                       <option value="premium">Premium</option>

                  </select>

                </div>
             </div>
             <button onclick="addpatient()" class="btn btn-success mt-4">Register</button>
             <h3 class="mt-4">Registered Patients</h3>
             <table class="table table-bordered mt-3">
                <thead class="table-primary">
                    <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Disease</th>
                    <th>Room Type</th>
                    <th>Action</th>
                    
                    </tr>

                </thead>
                <tbody id="patienttable"></tbody>
                
             </table>
             <a href="dashboard.html" class="btn btn-dark mt-4">Back</a>

        </div>
        <script>
          async function addpatient() {
          let patientname = document.getElementById("patientname").value;
            let patientage = document.getElementById("patientage").value;
                 let disease = document.getElementById("disease").value;
                     let roomtype = document.getElementById("roomtype").value;
          await fetch(`http://localhost:8080/addpatient?patientname=${patientname}&patientage=${patientage}&disease=${disease}&roomtype=${roomtype}`);
          loadpatient();
          document.getElementById("patientname").value = "";
          document.getElementById("patientage").value = "";
          document.getElementById("disease").value = "";
          document.getElementById("roomtype").value = "";
          
            
          }
          async function loadpatient() {
          let response = await fetch(`http://localhost:8080/patientdetails`);
          let patientdata = await response.json();
          let row = "";
          for(let patient of patientdata){
            row += `
            <tr>
              <td>${patient.patientname}</td>
               <td>${patient.patientage}</td>
                <td>${patient.disease}</td>
                 <td>${patient.roomtype}</td>
                 <td><button onclick="deletepatient(${patient.id})" class="btn btn-danger btn-sm">Delete </button></td>
                  </tr>
                  `;

          }
          document.getElementById("patienttable").innerHTML = row;
            
          }
          loadpatient();
          async function deletepatient(id) {
            let confirmdelete = confirm("Are you want to delete this record");
            if(!confirmdelete){
                return;
            }
            await fetch(`http://localhost:8080/deletepatient?id=${id}`,
                {
                    method:"DELETE"
                }
            );
            loadpatient();
            
          }
        </script>
    </body>
</html>
