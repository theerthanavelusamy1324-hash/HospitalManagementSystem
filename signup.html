<html>
    <head>
        <title>Signup</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            .card{
                position:absolute;
                top:50px;
                width:400px;
                margin-top:80px;
                margin-left:400px;
                border-radius:10px;
            }
             img{
                position:relative;
                width:100%;
                height:100%;
            }
        </style> 
    </head>
    <body class="bg-light">
        <img src="https://tse2.mm.bing.net/th/id/OIP.hyXw8mpYOJVAd9k0naWcJAHaE7?pid=Api&P=0&h=180">
        <div class="container">
            <div class="card p-3 text-center">
                <h3 class="text-primary">🏥  Create Account</h3>
                 <input type="text" id="username" placeholder="UserName" class="form-control mt-3">
                <input type="email" id="email" placeholder="Email" class="form-control mt-3">
                 <input type="password" id="password" placeholder="Password" class="form-control mt-3">
                 <button onclick="register()" class="btn btn-success mt-4">Register</button>
                 <p class="mt-3">Already have a account?<span class="text-primary mt-3" onclick="back()">Login</span></p>
                 <p class="mt-3 text-danger" id="results"></p>
            </div>
        </div>
        <script>
            async function register() {
                 let username = document.getElementById("username").value;
                let email = document.getElementById("email").value;
                 let password = document.getElementById("password").value;
            let response = await fetch(`http://localhost:8080/register?username=${username}&email=${email}&password=${password}`,
                {
                    method:"POST"
                }
            );
            let data = await response.text();
            document.getElementById("results").innerHTML = data;
                
            }
             function back(){
                window.location.href = "login.html";
            }
        </script>
    </body>
</html>
