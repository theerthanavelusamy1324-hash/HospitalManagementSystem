<html>
    <head>
        <title>Dashboard</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
       <style>
        .card{
            border-radius:10px;
            border:none;
        }
       </style>
    </head>
    <body class="bg-light">
        <nav class="navbar bg-primary">
            <span class="navbar-brand text-white ms-5">🏥 Hospital Dashboard</span>
            <div class="buttons">
                <a href="patients.html" class="btn btn-success me-4">Patients</a>
                <a href="doctors.html" class="btn btn-dark me-4">Doctors</a>
                <a href="appointments.html" class="btn btn-warning me-4">Appointments</a>
                 <a href="chats.html" class="btn btn-info me-4">Chat Assistant</a>
                <a href="login.html" class="btn btn-danger me-4">Logout</a>
            </div>
        </nav>
        <div class="container">
            <div class="row mt-4">
                <div class="col-md-3">
                    <div class="card p-3 text-center shadow">
                        <h5>Total Patients</h5>
                        <h5 class="text-primary" id="totalpatients"></h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 text-center shadow">
                        <h5>Total Doctors</h5>
                        <h5 class="text-success" id="totaldoctors"></h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 text-center shadow">
                        <h5>Available doctors</h5>
                        <h5 class="text-danger" id="availabledoctors"></h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 text-center shadow">
                        <h5>Total Appointments</h5>
                        <h5 class="text-warning" id="totalappointments"></h5>
                    </div>
                </div>
            </div>
        </div>
        <script>
            async function patientcount() {
            let response = await fetch(`http://localhost:8080/patientcount`);
            let patientcount = await response.text();
            document.getElementById("totalpatients").innerHTML = patientcount;
                
            }
            patientcount();
            async function doctorcount() {
            let response = await fetch(`http://localhost:8080/doctorcount`);
            let doctorcount = await response.text();
            document.getElementById("totaldoctors").innerHTML = doctorcount;
                
            }
            doctorcount();
            async function availablecount() {
                let response = await fetch(`http://localhost:8080/availabledoctor`);
                let availablecount = await response.json();
            document.getElementById("availabledoctors").innerHTML = availablecount;
                
            }
            availablecount();
            async function appointmentcount() {
            let response = await fetch(`http://localhost:8080/appointmentcount`);
            let appointmentcount = await response.text();
            document.getElementById("totalappointments").innerHTML = appointmentcount;
                
            }
            appointmentcount();
        </script>
    </body>
</html>
